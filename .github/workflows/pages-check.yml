name: pages check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  links:
    name: local page targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check osauer.dev/ibkr links
        run: node scripts/check-pages-links.mjs
