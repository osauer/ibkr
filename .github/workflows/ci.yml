name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + vet + vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt: the following files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: pkg tests
        run: go test -count=1 -timeout=180s ./pkg/ibkr/...

      - name: daemon + integration tests (-race)
        run: |
          go test -race -count=1 -timeout=240s ./internal/...
          go test -race -count=1 -timeout=420s ./test/integration/...

  cross-compile:
    name: cross-compile release matrix
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build matrix (darwin/linux × amd64/arm64)
        run: |
          set -euo pipefail
          for target in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64; do
            os=$(echo "$target" | cut -d- -f1)
            arch=$(echo "$target" | cut -d- -f2)
            echo "==> $os/$arch"
            GOOS=$os GOARCH=$arch go build -trimpath -buildvcs=false -o /tmp/ibkr-$target ./cmd/ibkr
          done
