name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check (lint + vet + vulncheck + parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make check
        run: make check CHECK_DEPS=parity-check

  test:
    name: make test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make test-pkg
        run: make test-pkg

      - name: make test-daemon (-race; integration tests self-skip when no gateway)
        run: make test-daemon

  cross-compile:
    name: cross-compile release matrix
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build matrix (darwin/linux × amd64/arm64)
        run: |
          set -euo pipefail
          for target in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64; do
            os=$(echo "$target" | cut -d- -f1)
            arch=$(echo "$target" | cut -d- -f2)
            echo "==> $os/$arch"
            GOOS=$os GOARCH=$arch go build -trimpath -buildvcs=false -o /tmp/ibkr-$target ./cmd/ibkr
          done
