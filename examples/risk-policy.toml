# Personal risk constitution — activate by copying to
# ~/.config/ibkr/policies/risk-policy.toml
#
# This file is the authority over personal capital numbers
# (docs/design/risk-policy.md). There is NO embedded default: a key you do
# not write does not exist, the dependent control renders "unapproved", and
# `ibkr policy show --explain` names the gap. Editing any value without
# raising policy_version puts the manager in drift status.
#
# Every commented-out key below is a decision the operator has not made
# yet. Do not let a tool fill one in; write the number you actually mean.

kind = "ibkr.risk_policy"
schema_version = 1
policy_id = "risk-constitution"
policy_version = 1

[capital]
# Must match the account base currency; observations in any other currency
# are refused for capital math.
base_currency = "EUR"
# Equity that is never risk capital (policy boundary, not segregation).
#protected_floor = 0.0
# The money deliberately authorized to be at risk. Effective risk capital =
# min(declared_risk_capital, equity - protected_floor). Deposits and
# profits never raise this; only a policy revision does.
#declared_risk_capital = 0.0
# Staleness horizons: beyond these, capital state is stale — disclosed now,
# fail-closed for risk increases once the block control is promoted to hard.
#max_equity_age_minutes = 0
#max_unreconciled_days = 0

[drawdown]
# Both tiers are % of declared_risk_capital consumed from the
# cash-flow-adjusted equity peak. warn is advisory and self-clearing; block
# latches until a journaled human reset (`ibkr policy reset-drawdown`).
#warn_consumed_pct = 0.0
#block_consumed_pct = 0.0
# shadow: journal what would block, gate nothing (default).
# advisory: warn loudly on surfaces and previews, gate nothing.
# "hard" is rejected by schema v1 — promotion is a later human revision.
block_enforcement = "shadow"

[override]
# Longest lifetime of a one-shot exception (`ibkr policy override`).
# Overrides are human-only, single-control, reasoned, journaled, expiring.
#max_duration_hours = 0

[recon]
# What counts as a reconciliation exception when broker statement flows
# are matched against declared capital events (docs/design/post-trade-truth.md).
# Reconcile sign-off requires a fresh, fully resolved `ibkr recon` report.
#amount_tolerance_pct = 0.0
#amount_tolerance_min = 0.0
#date_window_business_days = 0
#max_report_age_days = 0
# v3 only: maximum absolute same-day statement-vs-runtime equity divergence
# permitted before a clean report may extend the reconcile clock automatically.
#max_equity_divergence_pct = 0.0

# Operating-cadence artefacts (phase 2). Declaring one enables
# `ibkr policy artefact <name>` completion journaling. All advisory in v1.
[cadence.morning]
class = "advisory"
[cadence.eod]
class = "advisory"
[cadence.weekly]
class = "advisory"

# Sibling-policy pins: the constitution records which policy versions it
# was approved against; `ibkr policy show` discloses drift. Identity only —
# thresholds stay authoritative in their own files/code.
[inventory.rulebook]
id = "rulebook-v2"
version = "2"
[inventory.protection]
id = "protection-mvp"
version = "3"
[inventory.canary]
id = "active-v1"
version = "risk-policy-v1"
